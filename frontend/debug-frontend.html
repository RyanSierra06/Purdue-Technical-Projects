<!DOCTYPE html>
<html>
<head>
    <title>Frontend Debug Test</title>
</head>
<body>
    <h1>Frontend Debug Test</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        // Test 1: Check if we can make API calls
        async function testAPI() {
            results.innerHTML += '<h2>Testing API Connection...</h2>';
            
            try {
                // Test health endpoint
                const healthResponse = await fetch('https://purdue-technical-projects.onrender.com/api/health');
                if (healthResponse.ok) {
                    const healthData = await healthResponse.json();
                    results.innerHTML += `<p>✅ Health check: ${JSON.stringify(healthData)}</p>`;
                } else {
                    results.innerHTML += `<p>❌ Health check failed: ${healthResponse.status}</p>`;
                }
                
                // Test projects endpoint
                const projectsResponse = await fetch('https://purdue-technical-projects.onrender.com/api/projects');
                if (projectsResponse.ok) {
                    const projectsData = await projectsResponse.json();
                    results.innerHTML += `<p>✅ Projects API: Found ${projectsData.length} projects</p>`;
                    results.innerHTML += `<p>First project: ${projectsData[0]?.name || 'None'}</p>`;
                } else {
                    results.innerHTML += `<p>❌ Projects API failed: ${projectsResponse.status}</p>`;
                }
                
            } catch (error) {
                results.innerHTML += `<p>❌ API Error: ${error.message}</p>`;
            }
        }
        
        // Test 2: Check CORS
        async function testCORS() {
            results.innerHTML += '<h2>Testing CORS...</h2>';
            
            try {
                const response = await fetch('https://purdue-technical-projects.onrender.com/api/projects', {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    results.innerHTML += '<p>✅ CORS: Request successful</p>';
                } else {
                    results.innerHTML += `<p>❌ CORS: Request failed with status ${response.status}</p>`;
                }
            } catch (error) {
                results.innerHTML += `<p>❌ CORS Error: ${error.message}</p>`;
            }
        }
        
        // Run tests
        testAPI();
        testCORS();
    </script>
</body>
</html>
